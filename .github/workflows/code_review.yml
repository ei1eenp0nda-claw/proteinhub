name: Code Review & Quality Checks

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  # ============================================================================
  # Python Backend Quality Checks
  # ============================================================================
  backend-quality:
    name: Backend Code Quality
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint black isort mypy bandit safety
        pip install pytest pytest-cov pytest-xdist
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    # -------------------------------------------------------------------------
    # Security Checks
    # -------------------------------------------------------------------------
    - name: Security scan with Bandit
      working-directory: ./backend
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . || true
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      working-directory: ./backend
      run: |
        safety check || true
      continue-on-error: true
    
    # -------------------------------------------------------------------------
    # Code Style Checks
    # -------------------------------------------------------------------------
    - name: Check code formatting with Black
      working-directory: ./backend
      run: |
        black --check --diff . || true
      continue-on-error: true
    
    - name: Check import order with isort
      working-directory: ./backend
      run: |
        isort --check-only --diff . || true
      continue-on-error: true
    
    - name: Lint with flake8
      working-directory: ./backend
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type check with mypy
      working-directory: ./backend
      run: |
        mypy . --ignore-missing-imports || true
      continue-on-error: true
    
    # -------------------------------------------------------------------------
    # Complexity Analysis
    # -------------------------------------------------------------------------
    - name: Check code complexity
      working-directory: ./backend
      run: |
        pip install radon
        radon cc . -a -nc || true
        radon mi . || true
      continue-on-error: true
    
    # -------------------------------------------------------------------------
    # Unit Tests with Coverage
    # -------------------------------------------------------------------------
    - name: Run tests with pytest
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://test:test@localhost:5432/test
        TESTING: true
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-fail-under=60 || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false
    
    # -------------------------------------------------------------------------
    # Upload Reports
    # -------------------------------------------------------------------------
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-reports
        path: |
          backend/htmlcov/
          backend/bandit-report.json
          backend/coverage.xml


  # ============================================================================
  # Frontend Quality Checks
  # ============================================================================
  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: |
        npm ci || npm install
    
    # -------------------------------------------------------------------------
    # Linting & Formatting
    # -------------------------------------------------------------------------
    - name: Run ESLint
      working-directory: ./frontend
      run: |
        npm run lint || npx eslint src/ --ext .js,.vue || true
      continue-on-error: true
    
    - name: Check formatting with Prettier
      working-directory: ./frontend
      run: |
        npx prettier --check "src/**/*.{js,vue,css,scss}" || true
      continue-on-error: true
    
    # -------------------------------------------------------------------------
    # Security Audit
    # -------------------------------------------------------------------------
    - name: Run npm audit
      working-directory: ./frontend
      run: |
        npm audit --audit-level=high || true
      continue-on-error: true
    
    # -------------------------------------------------------------------------
    # Build Check
    # -------------------------------------------------------------------------
    - name: Build frontend
      working-directory: ./frontend
      run: |
        npm run build || true
      continue-on-error: true
    
    # -------------------------------------------------------------------------
    # Unit Tests
    # -------------------------------------------------------------------------
    - name: Run unit tests
      working-directory: ./frontend
      run: |
        npm run test:unit || npm test || true
      continue-on-error: true


  # ============================================================================
  # Documentation & Best Practices
  # ============================================================================
  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check for README updates
      run: |
        if git diff --name-only HEAD~1 | grep -q "^backend/"; then
          echo "Checking backend documentation..."
          if [ ! -f "backend/README.md" ]; then
            echo "⚠️ Warning: backend/README.md not found"
          fi
        fi
    
    - name: Check for CHANGELOG updates
      run: |
        if [ ! -f "CHANGELOG.md" ]; then
          echo "⚠️ Warning: CHANGELOG.md not found"
        fi


  # ============================================================================
  # Code Review Summary
  # ============================================================================
  review-summary:
    name: Code Review Summary
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Generate Review Summary
      run: |
        echo "## 📊 Code Review Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Backend Quality" >> $GITHUB_STEP_SUMMARY
        echo "- Flake8 linting: Completed" >> $GITHUB_STEP_SUMMARY
        echo "- Bandit security scan: Completed" >> $GITHUB_STEP_SUMMARY
        echo "- pytest unit tests: Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Frontend Quality" >> $GITHUB_STEP_SUMMARY
        echo "- ESLint: Completed" >> $GITHUB_STEP_SUMMARY
        echo "- npm audit: Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Backend coverage reports: backend-reports" >> $GITHUB_STEP_SUMMARY
    
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const message = `
          ## 🔍 Automated Code Review Complete
          
          ### Quality Checks
          - ✅ Backend linting (flake8)
          - ✅ Security scan (Bandit)
          - ✅ Dependency audit (npm audit)
          - 🧪 Unit tests (pytest)
          
          ### Reports
          - Coverage report: See Artifacts → backend-reports
          
          > Please review any warnings in the Checks tab.
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: message
          });


  # ============================================================================
  # Notify on Failure
  # ============================================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    if: failure()
    
    steps:
    - name: Notify failure
      run: |
        echo "❌ Code quality checks failed!"
        echo "Please check the detailed logs above."
