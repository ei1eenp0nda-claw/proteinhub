version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: proteinhub
      POSTGRES_USER: proteinhub
      POSTGRES_PASSWORD: proteinhub123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://proteinhub:proteinhub123@db:5432/proteinhub
      FLASK_ENV: development
    depends_on:
      - db
  
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  postgres_data: